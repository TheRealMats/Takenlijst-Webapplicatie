<!-- de basisopmaak die op elke pagina hetzelfde is (navigatie, header etc.)-->

<!DOCTYPE html> <!-- Vertelt de browser dat dit een HTML5 document is -->
<html>
<head>
    <title>Takenlijst</title> <!-- Titel die je ziet in het browsertabblad -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">    <!-- Dit voegt specifieke lettertpye toe -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> <!-- Koppelt de CSS -->
</head>
<body>
    <!-- Onderstaande code is voor een navigatiebalk, zodat je altijd op elke pagina makkelijk heen en weer kan navigeren. -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Takenlijst</a>
            <div>
                <a href="/taak/toevoegen" class="btn btn-outline-light me-2">Taak toevoegen</a>
                <a href="/categorie/toevoegen" class="btn btn-outline-light me-2">Categorie toevoegen</a>
                <a href="/overzicht" class="btn btn-outline-light">Taakoverzicht</a>
                <a href="/categorie_overzicht" class="btn btn-outline-light">Categorieoverzicht</a>
            </div>
        </div>
    </nav>
    {% block content %} <!-- Hier komt de inhoud van andere pagina's, die kunnen dan onderling verbinding maken met base.html! -->
    {% endblock %}
</body>
</html>
